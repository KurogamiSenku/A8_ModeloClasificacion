<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Clasificador de Calidad del Vino</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="p-4">
    <div class="container">
        <h1 class="mb-4">🍷 Clasificador de Calidad del Vino</h1>
        
        <form action="/clasificar" method="post" enctype="multipart/form-data" class="mb-3">
            <div class="mb-3">
                <label for="file" class="form-label">Subir archivo Excel (.xlsx):</label>
                <input type="file" name="file" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary">Clasificar</button>
        </form>

        {% if tabla %}
            <h3>Resultados:</h3>
            {{ tabla|safe }}
            <a href="/descargar" class="btn btn-success mt-3">Descargar resultados</a>
        {% endif %}
    </div>
</body>
</html>
